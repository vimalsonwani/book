<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portfolio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .loader-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 pb-10">

    <div id="loadingOverlay" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex flex-col items-center justify-center text-white">
        <div class="loader-spinner mb-4"></div>
        <p class="font-medium">Fetching Student Data...</p>
    </div>

    <div class="max-w-4xl mx-auto p-4">
        <header class="mb-6 no-print">
            <h1 class="text-2xl font-bold text-gray-900">Class 2A</h1>
            <p class="text-sm text-gray-500">2026-27</p>
        </header>

        <div id="studentsList" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-3 pb-4 no-print">
            </div>

        <div id="portfolio" class="hidden bg-white rounded-3xl shadow-xl overflow-hidden animate-in fade-in duration-500">
            
            <div class="bg-slate-900 p-6 text-white text-center md:text-left md:flex md:items-center md:gap-6">
                <img id="p-photo" class="w-44 h-44 md:w-32 md:h-32 mx-auto md:mx-0 rounded-2xl object-cover border-2 border-slate-700 bg-white shadow-lg">
                <div class="mt-4 md:mt-0 flex-1">
                    <h2 id="p-name" class="text-2xl font-bold truncate"></h2>
                    <p class="text-slate-400 text-sm">Roll: <span id="p-roll"></span> | Admn: <span id="p-admn"></span></p>
                    <button onclick="window.print()" class="mt-4 no-print text-xs bg-slate-700 px-4 py-2 rounded-full hover:bg-slate-600">Export PDF</button>
                </div>
            </div>

            <div class="flex border-b text-sm no-print sticky top-0 bg-white z-10 overflow-x-auto">
                <button onclick="switchTab('profile')" id="tab-profile" class="flex-1 py-4 px-2 tab-active text-center whitespace-nowrap">Profile</button>
                <button onclick="switchTab('academic')" id="tab-academic" class="flex-1 py-4 px-2 text-center whitespace-nowrap">Academic</button>
                <button onclick="switchTab('activities')" id="tab-activities" class="flex-1 py-4 px-2 text-center whitespace-nowrap">Activities</button>
                
            </div>

            <div class="p-6">
                <div id="content-profile" class="space-y-4">
                    <h3 class="font-bold text-lg mb-4">Personal Details</h3>
                    <div id="personal-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                        </div>
                    <a id="waLink"
   target="_blank"
   class="inline-block mt-2 bg-green-500 hover:bg-green-600 text-white font-medium py-2 px-5 rounded-full no-print">
   WhatsApp
</a>
              <a id="smsLink"
   target="_blank"
   class="inline-block mt-2 bg-green-500 hover:bg-green-600 text-white font-medium py-2 px-5 rounded-full no-print">
   sms
</a>
                </div>

                <div id="content-academic" class="hidden space-y-8">
                    <div>
                        <h3 class="font-bold text-lg mb-2">Monthly Attendance</h3>
                        <canvas id="attChart" class="max-h-64"></canvas>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg mb-4">Subject Performance</h3>
                        <div id="exam-container" class="space-y-6"></div>
                    </div>
                </div>

                <div id="content-activities" class="hidden">
                    <h3 class="font-bold text-lg mb-6">Activity Timeline</h3>
                    <div id="p-activities" class="relative border-l-2 border-blue-100 ml-4 pl-8 space-y-8">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxLSkFHKgfcLadKBBTqLJBLideJQXSn_RzDoGZJN7whNJd6QVF1lpU69utTmrkkXYek/exec"; 
        let studentCharts = {};

        // Initial Load
        fetch(`${API}?action=students`).then(r => r.json()).then(data => {
            document.getElementById('studentsList').innerHTML = data.map(s => `
                <div onclick="loadStudent('${s.id}')" class="min-w-[100px] flex-shrink-0 bg-white p-3 rounded-2xl shadow-sm border text-center transition active:scale-95">
                    <img src="photos/${s.photo}" class="w-12 h-12 mx-auto rounded-full object-cover mb-2 border">
                    <p class="text-[10px] font-bold truncate">${s.name.split(' ')[0]}</p>
                </div>
            `).join('');
        });

        function loadStudent(id) {
            toggleLoader(true);
            fetch(`${API}?action=student&id=${id}`).then(r => r.json()).then(res => {
                const p = res.profile;
                document.getElementById('portfolio').classList.remove('hidden');
                document.getElementById('p-photo').src = `photos/${p.photo}`;
                document.getElementById('p-name').innerText = p.name;
                document.getElementById('p-roll').innerText = p.roll;
                document.getElementById('p-admn').innerText = p.admnNo;

                // Profile Info Grid
                const labels = [
                    ["Father", p.father], ["Mother", p.mother], ["DOB", p.dob], 
                    ["Blood", p.blood], ["Mobile", p.mobile], ["Gender", p.gender],
                    ["PEN", p.pen], ["APAAR ID", p.apaar], ["Aadhaar", p.aadhaar],
                    ["Category", p.cat], ["Admn Category", p.admnCat], ["Minority", p.minority], ["Exemptions", p.exemption], ["House", p.house], ["Address", p.address]
                ];
                document.getElementById('personal-grid').innerHTML = labels.map(i => `
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <span class="text-[10px] uppercase font-bold text-gray-400 block">${i[0]}</span>
                        <span class="text-sm font-medium text-gray-800">${i[1] || 'N/A'}</span>
                    </div>
                `).join('');
const message = `प्रिय अभिभावक,\nकृपया ${p.name} कक्षा 2A की फीस जमा करें।\nधन्यवाद,\nकेंद्रीय विद्यालय नं. 3 बोकारो`;

// SMS
smsLink.href = `sms:${p.mobile}?body=${encodeURIComponent(message)}`;

// WhatsApp
waLink.href = `https://wa.me/91${p.mobile}?text=${encodeURIComponent(message)}`;
                // Attendance
                renderChart(res.attendance);

                // Exams
                const examGroups = res.progress.reduce((acc, c) => {
                    (acc[c.exam] = acc[c.exam] || []).push(c); return acc;
                }, {});
                document.getElementById('exam-container').innerHTML = Object.keys(examGroups).map(exam => `
                    <div class="bg-white rounded-xl border border-gray-100 overflow-hidden shadow-sm">
                        <div class="bg-gray-50 px-4 py-3 font-bold text-gray-700 border-b">${exam}</div>
                        <div class="p-4 space-y-2">
                            ${examGroups[exam].map(r => `
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-500">${r.subject}</span>
                                    <span class="font-bold">${r.score}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');

                // Activities
                document.getElementById('p-activities').innerHTML = res.activities.map(a => `
                    <div class="relative">
                        <div class="absolute -left-[38px] top-1.5 w-4 h-4 rounded-full bg-blue-500 border-4 border-white"></div>
                        <p class="text-[10px] font-bold text-blue-500 uppercase">${new Date(a.date).toLocaleDateString()}</p>
                        <p class="text-sm font-medium text-gray-700">${a.activity}</p>
                    </div>
                `).join('') || "<p class='text-gray-400'>No records</p>";

                switchTab('profile'); // Reset to profile view
                toggleLoader(false);
                document.getElementById('portfolio').scrollIntoView({ behavior: 'smooth' });
            });
        }

        function switchTab(tab) {
            const tabs = ['profile', 'academic', 'activities'];
            tabs.forEach(t => {
                document.getElementById(`content-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        }

        function toggleLoader(show) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
        }

        function renderChart(data) {
            const ctx = document.getElementById('attChart').getContext('2d');
            if(studentCharts.att) studentCharts.att.destroy();
            studentCharts.att = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.month),
                    datasets: [{ label: 'Attendance %', data: data.map(d => d.value), borderColor: '#3b82f6', fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)', tension: 0.4 }]
                },
                options: { plugins: { legend: { display: false } } }
            });
        }
    </script>
</body>
</html>
